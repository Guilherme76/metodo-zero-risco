name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Lint + Typecheck + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://metodo-zero-risco.vercel.app
          NEXT_PUBLIC_CHECKOUT_URL: https://pay.hotmart.com/RFP-SPORTS-VIP
